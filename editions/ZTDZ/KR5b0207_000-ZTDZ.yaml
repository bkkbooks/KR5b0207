front:
  text: 玉籙大齋第三日早朝儀午朝同卷晚朝儀缺率七
  hash: sha256:6be15b8bd10df61bc7e3c1b026de86665b3f66883fd656c3723230a44d0393a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0207_SJB_000-090174a, image: sjb/09/090174a.png}
body:
  text: 各禮師存念如法天書赦罪下頒太㣲元化生成靈烟九回八景六周聖運所持左賔赤方右啓帝扉東華南府灌煉辟非回輪日耀轉盻月輝今日大慶萬道同歸玄壇正炁保天無衰普吿三界驛龍風馳鳴法皷二十四通無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香金童傳言散花王女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓女壇土地方域神眞臣今早朝陞壇行道朝謁帝眞謹奏爲入意其諸誠意具載緘謄願得太上至眞道炁靈寳瑞光下降流入臣等身中令臣所啓之誠速逹徑御至眞无極大道三清上聖昊天至尊金闕玉皇上帝御前請稱法位具位與臨壇官衆等謹同誠上啓虚无自然元始天尊无極大道太上道君太上老君髙上玉皇十方巳得道太聖衆至眞諸君丈人三十二天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳瓊臺紫㣲上宫靈寳至眞明皇道君三十六部尊經玄中大法師上相上宰上保上傅太平下教二十四眞人西城惣眞王君太乙眞人東嶽上卿司命茅君定録保命二眞人名山洞府得道神仙三界官屬一切眞靈臣聞七素徘徊兆七陽而分化五元因合煥五緯以乗天儲粹幽㣲浮空髙爽總攝梵英之炁肇萌皓景之光積號延康開明億劫紀素靈之玉曆凝結成書闡黄老之寳章芒虚符篆八威安鎮萬寳生成臣等叨位玄門列名紫格叅金闕自然之道靜念至眞受錦囊大有之文恭依具典凡有奏啓敢不以聞齋意青詞謹當宣奏宣詞具如詞㫖不違欵懇恩惟大道分别哀祈臣聞湛寂元尊御清㣲而不宰撫綏九有履玄運以無𥝠弘敷妙道之因太極幽途之苦臣等待旦存神詰朝行道紫霞耀日蒼龍𥘉上於扶桑赤景流空義馭巳行於東陸返飈輪於眞境靄雲蓋於太虚恭假香傳奉修齋直以今第三日清旦行道請法衆等運兹初捻上香願此香烟騰空徑上供養虚无至眞自然大道元始天尊願以是捻香功德上祝當今皇帝景命無疆伏願翕受百祥順齊七政嘉禾朱草屢臻地寳之和甘露景星並見天休之應龍馬徠從於西極鳳凰翔集於紫庭諸福備膺四靈畢集珎符沓至叶炁旁流今故燒香自皈依道尊大聖衆至眞之德得道之後祈天長存臣聞玉笈垂文作人天之範金眞演教爲生死之津梁囦乎妙有之功大矣難名之化以今第三日清旦行道請法衆等運兹二捻上香願此香烟騰空徑上供養玉晨至聖自然靈寳大道天尊願以是捻香功德上資某靈伏願九玄七祖億劫種親並願泛景太霞飛神空洞登眞悟道陪九老以遨遊凝玄錬眞叅十華而嘯詠斷鬼官之逮役度上南宫臻隨劫以長存生身受度福流裔嗣慶及宗親今故燒香自皈依經尊大聖衆至眞之德得道之後昇入無形臣聞聖德涵容著延生之玉曆道慈博愛啓落死之玄文斡運隂陽主張造化以今第三日清旦行道請法衆等運兹三捻上香願此香烟騰空徑上供養混元大聖自然化主道德天尊願以是捻香功德上資所薦神靈伏願序列眞仙炁歸梵輔怡神遐想翳秀葉之翠霞振袂高登聽瓊房之妙韻停䕃清泠之渚乗輪深邈之衢帶豁重開運叅靈化爽魄隨本玄㑹無涯今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形懴悔三啓三禮重稱法位具位與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天眞十方師尊聖衆三界官屬一切威靈臣聞七過開關星宿朗明而停景九陽結炁形神錬度以登晨臣等早慕精修獲叅奥㫖所冝結胎嬰而養素坐致自然混生炁以歸身躬行内錬未臻神化須有功勤期引接於群生誓流行於大教况承詞㫖恭爲典行今奉某靈自從宿世以及今身舉意故爲動情誤犯未能堅持純實恪守温良曽無反已之誠靡奉成眞之戒尤恐還生人道久汨塵勞不能保命以愛神至于死壞而不顧沉聲滯色離其本眞致生炁之無津固死根而結滯仰祈錬度普獲飛昇伏願垂憫蒼生廣施玄澤敕九光之童子請五老之靈君餔飴以五色之晶灌注以九陽之炁埏容流火沐浴黄華又請百錬金剛千和玉液元皇散妙太白流光宣通胞源解開結節混合神質灌錬身心俾臓腑以清凉使魂神而安鎮廽骸起死返隂成陽重敕天醫之功曹散布太清之神藥即使魂儀受鍊仙化更生乘九炁以結形蒙三元而育質三關五臟六府九宫本始生神根源復命合靈捐息懷胎皆得以生成朽骨枯骸易質咸承於超度則上明天尊大慈之化下副臣等皈命之誠謹啓以聞一願天澄炁朗二願日照月臨三願景星出現四願法雨霖淫五願𡨚愆罷對六願苦楚停吟七願龍章飛舞八願鳳篆流金九願眞靈集降十願福被幽隂十一願靈魂普度十二願平歩超升復爐存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來早朝陞壇行道之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前當願十方仙童玉女接侍蘭煙傳臣向來所奏之誠速逹徑上至眞无極大道三清上聖昊天至尊金闕玉皇上帝御前玉籙大齋第三日早朝儀
