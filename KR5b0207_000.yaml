front:
  text: 玉籙大齋第三日早朝儀午朝同卷晚朝儀缺率七
  hash: sha256:6be15b8bd10df61bc7e3c1b026de86665b3f66883fd656c3723230a44d0393a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0207_HFL_000-001a, image: hfl/0269/0269-100.png}
body:
  text: 各禮師存念如法天書赦罪下頒太微元化生成靈煙九回八景六周聖運所持左賔赤方右啓帝扉東華南府灌煉辟非回輪日耀轉盻月輝今日大慶萬道同歸玄壇正氣保天無衰普告三界驛龍風馳鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣身中三五功曹左右官使者左右捧香金童傳言散花王女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓女壇土地方域神真臣今早朝升壇行道朝謁帝真謹奏為入意其諸誠意具載緘謄願得太上至真道氣靈寶瑞光下降流入臣等身中令臣所啓之誠速逹徑御至真無極大道三清上聖昊天至尊金闕玉皇上帝御前請稱法位具位與臨壇官衆等謹同誠上啓虛無自然元始天尊無極大道太上道君太上老君髙上玉皇十方巳得道太聖衆至真諸君丈人三十二天帝君玉虛上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宫靈寶至真明皇道君三十六部尊經玄中大法師上相上宰上保上傅太平下教二十四真人西城惣真王君太乙真人東嶽上卿司命茅君定録保命二真人名山洞府得道神仙三界官屬一切真靈臣聞七素徘徊兆七陽而分化五元因合煥五緯以乘天儲粹幽微浮空髙爽總攝梵英之氣肇萌皓景之光積號延康開明億劫紀素靈之玉曆凝結成書闡黃老之寶章芒虛符篆八威安鎮萬寶生成臣等叨位玄門列名紫格參金闕自然之道靜念至真受錦囊大有之文恭依具典凡有奏啓敢不以聞齋意青詞謹當宣奏宣詞具如詞旨不違欵懇恩惟大道分别哀祈臣聞湛寂元尊御清微而不宰撫綏九有履玄運以無𥝠弘敷妙道之因太極幽途之苦臣等待旦存神詰朝行道紫霞耀日蒼龍𥘉上於扶桑赤景流空義馭巳行於東陸返飈輪於真境靄雲蓋於太虛恭假香傳奉修齋直以今第三日清旦行道請法衆等運兹初捻上香願此香煙騰空徑上供養虛無至真自然大道元始天尊願以是捻香功德上祝當今皇帝景命無疆伏願翕受百祥順齊七政嘉禾朱草屢臻地寶之和甘露景星並見天休之應龍馬徠從於西極鳳凰翔集於紫庭諸福備膺四靈畢集珍符沓至叶氣旁流今故燒香自皈依道尊大聖衆至真之德得道之後祈天長存臣聞玉笈垂文作人天之範金真演教為生死之津梁囦乎妙有之功大矣難名之化以今第三日清旦行道請法衆等運兹二捻上香願此香煙騰空徑上供養玉晨至聖自然靈寶大道天尊願以是捻香功德上資某靈伏願九玄七祖億劫種親並願泛景太霞飛神空洞登真悟道陪九老以遨遊凝玄錬真參十華而嘯詠斷鬼官之逮役度上南宫臻隨劫以長存生身受度福流裔嗣慶及宗親今故燒香自皈依經尊大聖衆至真之德得道之後升入無形臣聞聖德涵容著延生之玉曆道慈博愛啓落死之玄文斡運隂陽主張造化以今第三日清旦行道請法衆等運兹三捻上香願此香煙騰空徑上供養混元大聖自然化主道德天尊願以是捻香功德上資所薦神靈伏願序列真仙氣歸梵輔怡神遐想翳秀葉之翠霞振袂高登聽瓊房之妙韻停蔭清泠之渚乘輪深邈之衢帶豁重開運參靈化爽魄隨本玄會無涯今故燒香自皈依師尊大聖衆至真之德得道之後升入無形懴悔三啓三禮重稱法位具位與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天真十方師尊聖衆三界官屬一切威靈臣聞七過開關星宿朗明而停景九陽結氣形神錬度以登晨臣等早慕精修獲參奧旨所冝結胎嬰而養素坐致自然混生氣以歸身躬行內錬未臻神化須有功勤期引接於群生誓流行於大教况承詞旨恭為典行今奉某靈自從宿世以及今身舉意故為動情誤犯未能堅持純實恪守溫良曽無反已之誠靡奉成真之戒尤恐還生人道久汨塵勞不能保命以愛神至于死壞而不顧沉聲滯色離其本真致生氣之無津固死根而結滯仰祈錬度普獲飛升伏願垂憫蒼生廣施玄澤敕九光之童子請五老之靈君餔飴以五色之晶灌注以九陽之氣埏容流火沐浴黃華又請百錬金剛千和玉液元皇散妙太白流光宣通胞源解開結節混合神質灌錬身心俾臟腑以清涼使魂神而安鎮廽骸起死返隂成陽重敕天醫之功曹散布太清之神藥即使魂儀受鍊仙化更生乘九氣以結形蒙三元而育質三關五臟六府九宫本始生神根源復命合靈捐息懷胎皆得以生成朽骨枯骸易質咸承於超度則上明天尊大慈之化下副臣等皈命之誠謹啓以聞一願天澄氣朗二願日照月臨三願景星出現四願法雨霖淫五願𡨚愆罷對六願苦楚停吟七願龍章飛舞八願鳳篆流金九願真靈集降十願福被幽隂十一願靈魂普度十二願平步超升復爐存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來早朝升壇行道之所自然生金液丹碧芝英百靈衆真交會在此香火爐前當願十方仙童玉女接侍蘭煙傳臣向來所奏之誠速逹徑上至真無極大道三清上聖昊天至尊金闕玉皇上帝御前玉籙大齋第三日早朝儀
